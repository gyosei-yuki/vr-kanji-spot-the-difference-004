<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>VR 漢字間違い探し【004】金性、車騎・牽牛の部屋。</title>
    <script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
    <script src="js/main.js"></script>
  </head>

  <body>
    <a-scene>
      <!-- assets -->
      <a-assets>
        <img id="sky" src="assets/sky.jpg" />

        <img id="tunnel" src="assets/tunnel.png" />
        <img id="tunnel-NRM" src="assets/tunnel-NRM.png" />

        <img id="tracks" src="assets/tracks37.png" />
        <img id="tracks-NRM" src="assets/tracks37-NRM.png" />

        <img id="gyu" src="assets/stage/gyu.png" />
        <img id="gyu-NRM" src="assets/stage/gyu-NRM.png" />

        <img id="sha" src="assets/stage/sha.png" />
        <img id="sha-NRM" src="assets/stage/sha-NRM.png" />

        <img id="ken" src="assets/stage/ken.png" />
        <img id="ken-NRM" src="assets/stage/ken-NRM.png" />

        <img id="ki" src="assets/stage/ki.png" />
        <img id="ki-NRM" src="assets/stage/ki-NRM.png" />

        <img id="q-gyu1" src="assets/quiz/gyu1.png" />
        <img id="q-gyu1-NRM" src="assets/quiz/gyu1-NRM.png" />
        <img id="q-gyu2" src="assets/quiz/gyu2.png" />
        <img id="q-gyu2-NRM" src="assets/quiz/gyu2-NRM.png" />
        <img id="q-gyu3" src="assets/quiz/gyu3.png" />
        <img id="q-gyu3-NRM" src="assets/quiz/gyu3-NRM.png" />

        <img id="q-sha1" src="assets/quiz/sha1.png" />
        <img id="q-sha1-NRM" src="assets/quiz/sha1-NRM.png" />
        <img id="q-sha2" src="assets/quiz/sha2.png" />
        <img id="q-sha2-NRM" src="assets/quiz/sha2-NRM.png" />
        <img id="q-sha3" src="assets/quiz/sha3.png" />
        <img id="q-sha3-NRM" src="assets/quiz/sha3-NRM.png" />

        <img id="q-ken1" src="assets/quiz/ken1.png" />
        <img id="q-ken1-NRM" src="assets/quiz/ken1-NRM.png" />
        <img id="q-ken2" src="assets/quiz/ken2.png" />
        <img id="q-ken2-NRM" src="assets/quiz/ken2-NRM.png" />
        <img id="q-ken3" src="assets/quiz/ken3.png" />
        <img id="q-ken3-NRM" src="assets/quiz/ken3-NRM.png" />

        <img id="q-ki1" src="assets/quiz/ki1.png" />
        <img id="q-ki1-NRM" src="assets/quiz/ki1-NRM.png" />
        <img id="q-ki2" src="assets/quiz/ki2.png" />
        <img id="q-ki2-NRM" src="assets/quiz/ki2-NRM.png" />
        <img id="q-ki3" src="assets/quiz/ki3.png" />
        <img id="q-ki3-NRM" src="assets/quiz/ki3-NRM.png" />

        <img id="correct" src="assets/correct.png" />
      </a-assets>

      <!-- Camera Rig -->
      <a-entity
        movement-controls="speed: 1; constrainToNavMesh: true"
        position="0 0 45"
      >
        <!-- Camera -->
        <a-entity
          camera
          position="0 1.6 0"
          look-controls="pointerLockEnabled: true"
          move-check="raycaster:#move"
          quiz-check="raycaster:#quiz"
        >
          <!-- timer -->
          <a-text
            color="#FF0000"
            align="center"
            position="0 1 -1.5"
            value="0"
          ></a-text>

          <a-entity
            id="move"
            rayOrigin="mouse"
            raycaster="objects: .gate; far: 0.15"
          ></a-entity>
          <a-cursor
            id="quiz"
            rayOrigin="mouse"
            raycaster="objects: .answer"
          ></a-cursor>
        </a-entity>
      </a-entity>

      <!-- nav-mesh -->
      <a-entity position=" 0 -0.1 0">
        <!-- 1st stage -->
        <a-plane
          id="first-gate"
          color="#000"
          width="5"
          height="100"
          rotation="-90 0 0"
          position="0 0 0"
          nav-mesh
        >
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 49 1"
            rotation="90 0 0"
            class="gate first-end"
            scale="10 10 0"
          >
          </a-plane>
        </a-plane>
        <a-plane
          id="first-stage"
          color="#000"
          width="98"
          height="98"
          rotation="-90 0 0"
          position="0 0 -95"
        ></a-plane>

        <!-- 2st stage -->
        <a-plane
          id="second-gate"
          color="#000"
          width="5"
          height="100"
          rotation="-90 90 0"
          position="-95 0 -95"
          visible="false"
        >
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 -47 1"
            rotation="90 0 0"
            class="gate second-start"
            scale="10 10 0"
          >
          </a-plane>
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 49 1"
            rotation="90 0 0"
            class="gate second-end"
            scale="10 10 0"
          >
          </a-plane>
        </a-plane>
        <a-plane
          id="second-stage"
          color="#000"
          width="98"
          height="98"
          rotation="-90 0 0"
          position="-190 0 -95"
        >
        </a-plane>

        <!-- 3st stage -->
        <a-plane
          id="third-gate"
          color="#000"
          width="5"
          height="100"
          rotation="-90 0 0"
          position="-190 0 -190"
          visible="false"
        >
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 -47 1"
            rotation="90 0 0"
            class="gate third-start"
            scale="10 10 0"
          >
          </a-plane>
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 49 1"
            rotation="90 0 0"
            class="gate third-end"
            scale="10 10 0"
          >
          </a-plane>
        </a-plane>
        <a-plane
          id="third-stage"
          color="#000"
          width="98"
          height="98"
          rotation="-90 0 0"
          position="-190 0 -285"
        >
        </a-plane>

        <!-- 4st stage -->
        <a-plane
          id="fourth-gate"
          color="#000"
          width="5"
          height="100"
          rotation="-90 90 0"
          position="-95 0 -285"
          visible="false"
        >
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 47 1"
            rotation="-90 0 0"
            class="gate fourth-start"
            scale="10 10 0"
          >
          </a-plane>
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 -49 1"
            rotation="-90 0 0"
            class="gate fourth-end"
            scale="10 10 0"
          >
          </a-plane>
        </a-plane>
        <a-plane
          id="fourth-stage"
          color="#000"
          width="98"
          height="98"
          rotation="-90 0 0"
          position="0 0 -285"
        >
        </a-plane>

        <!-- goal -->
        <a-plane
          id="goal-gate"
          color="#000"
          width="5"
          height="100"
          rotation="-90 0 0"
          position="0 0 -380"
          visible="false"
        >
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 -47 1"
            rotation="90 0 0"
            class="gate goal-start"
            scale="10 10 0"
          >
          </a-plane>
          <a-plane
            color="#333333"
            material="opacity:0"
            position="0 49 1"
            rotation="90 0 0"
            class="gate goal-end"
            scale="10 10 0"
          >
          </a-plane>
        </a-plane>
      </a-entity>

      <!-- 1st stage -->
      <a-entity position="0 0 0" rotation="0 0 0">
        <a-plane
          color="#666"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          width="100"
          height="100"
          depth="1"
          rotation="-90 0 0"
          position="0 0 0"
        >
          <a-plane
            material="src:#tracks; normalMap: #tracks-NRM; transparent: true"
            width=" 5.12"
            height="2.56"
            position="0 0 0.01"
            scale="1 37 1"
          >
          </a-plane>
        </a-plane>
        <a-cylinder
          id="first-tunnel"
          color="#333"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          side="double"
          height="100"
          radius="5"
          open-ended="true"
          rotation="270 0 0"
          position="0 1 0"
        ></a-cylinder>
        <a-box
          class="box-stage"
          material="src: #gyu;repeat: -10, 10; normalMap: #gyu-NRM; normalTextureRepeat: -10, 10"
          side="back"
          width="100"
          height="100"
          depth="100"
          position="0 50.1 -95"
        >
          <!-- 3文字のランダムなクイズ -->
        </a-box>
      </a-entity>

      <!-- 2st stage -->
      <a-entity position="-95 0 -95" rotation="0 90 0">
        <a-plane
          color="#666"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          width="100"
          height="100"
          depth="1"
          rotation="-90 0 0"
          position="0 0 0"
        >
          <a-plane
            material="src:#tracks; normalMap: #tracks-NRM; transparent: true"
            width=" 5.12"
            height="2.56"
            position="0 0 0.01"
            scale="1 37 1"
          >
          </a-plane>
        </a-plane>
        <a-cylinder
          id="second-tunnel"
          color="#333"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          side="double"
          height="100"
          radius="5"
          open-ended="true"
          rotation="270 0 0"
          position="0 1 0"
          visible="false"
        ></a-cylinder>
        <a-box
          class="box-stage"
          material="src: #sha;repeat: -10, 10; normalMap: #sha-NRM; normalTextureRepeat: -10, 10"
          side="back"
          width="100"
          height="100"
          depth="100"
          position="0 50.1 -95"
        >
          <!-- 3文字のランダムなクイズ -->
        </a-box>
      </a-entity>

      <!-- 3st stage -->
      <a-entity position="-190 0 -190" rotation="0 0 0">
        <a-plane
          color="#666"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          width="100"
          height="100"
          depth="1"
          rotation="-90 0 0"
          position="0 0 0"
        >
          <a-plane
            material="src:#tracks; normalMap: #tracks-NRM; transparent: true"
            width=" 5.12"
            height="2.56"
            position="0 0 0.01"
            scale="1 37 1"
          >
          </a-plane>
        </a-plane>
        <a-cylinder
          id="third-tunnel"
          color="#333"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          side="double"
          height="100"
          radius="5"
          open-ended="true"
          rotation="270 0 0"
          position="0 1 0"
          visible="false"
        ></a-cylinder>
        <a-box
          class="box-stage"
          material="src: #ken;repeat: -10, 10; normalMap: #ken-NRM; normalTextureRepeat: -10, 10"
          side="back"
          width="100"
          height="100"
          depth="100"
          position="0 50.1 -95"
        >
          <!-- 3文字のランダムなクイズ -->
        </a-box>
      </a-entity>

      <!-- 4st stage -->
      <a-entity position="-95 0 -285" rotation="0 270 0">
        <a-plane
          color="#666"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          width="100"
          height="100"
          depth="1"
          rotation="-90 0 0"
          position="0 0 0"
        >
          <a-plane
            material="src:#tracks; normalMap: #tracks-NRM; transparent: true"
            width=" 5.12"
            height="2.56"
            position="0 0 0.01"
            scale="1 37 1"
          >
          </a-plane>
        </a-plane>
        <a-cylinder
          id="fourth-tunnel"
          color="#333"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          side="double"
          height="100"
          radius="5"
          open-ended="true"
          rotation="270 0 0"
          position="0 1 0"
          visible="false"
        ></a-cylinder>
        <a-box
          class="box-stage"
          material="src: #ki;repeat: -10, 10; normalMap: #ki-NRM; normalTextureRepeat: -10, 10"
          side="back"
          width="100"
          height="100"
          depth="100"
          position="0 50.1 -95"
        >
          <!-- 3文字のランダムなクイズ -->
        </a-box>
      </a-entity>

      <!-- goal -->
      <a-entity position="0 0 -380" rotation="0 0 0">
        <a-plane
          color="#666"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          width="100"
          height="100"
          depth="1"
          rotation="-90 0 0"
          position="0 0 0"
        >
          <a-plane
            material="src:#tracks; normalMap: #tracks-NRM; transparent: true"
            width=" 5.12"
            height="2.56"
            position="0 0 0.01"
            scale="1 37 1"
          >
          </a-plane>
        </a-plane>
        <a-cylinder
          id="goal-tunnel"
          color="#333"
          material="src: #tunnel; normalMap: #tunnel-NRM"
          side="double"
          height="100"
          radius="5"
          open-ended="true"
          rotation="270 0 0"
          position="0 1 0"
          visible="false"
        ></a-cylinder>
      </a-entity>

      <!-- sky -->
      <a-sky src="#sky"></a-sky>
    </a-scene>
  </body>
</html>
